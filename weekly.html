    <link

    />
    <link rel="stylesheet" href="common.css" />
    <link rel="stylesheet" href="weekly.css" />
    <link rel="stylesheet" href="ai-chat.css" />
  </head>

  <body>
    <div class="site-wrapper">
      <!-- HEADER -->
      <header class="main-header">
        <div class="container">
          <div class="header-content">
            <div class="logo">Nhóm 12</div>

            <div class="categories-dropdown">
              <span class="dropdown-trigger">
                Tất cả danh mục <i class="fas fa-chevron-down"></i>
              </span>
              <div class="dropdown-menu">
                <a href="shop.html">Điện tử</a>
                <a href="shop.html">Gia dụng</a>
                <a href="smart-home.html">Nhà thông minh</a>
              </div>
            </div>

            <div class="search-bar">
              <input type="text" placeholder="Tìm ưu đãi..." />
              <button class="search-btn">
                <i class="fas fa-search"></i>
              </button>
            </div>

            <div class="user-actions">
              <a href="#" class="action-item"><i class="fas fa-user"></i></a>
              <a href="#" class="action-item"><i class="fas fa-bell"></i></a>
              <a href="#" class="action-item cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count">0</span>
              </a>
            </div>
          </div>
        </div>
      </header>

      <!-- NAV -->
      <nav class="secondary-nav">
        <div class="container nav-content">
          <ul class="nav-links">
            <li><a href="index.html">Trang chủ</a></li>
            <li><a href="shop.html">Cửa hàng</a></li>
            <li><a href="brands.html">Thương hiệu</a></li>
            <li><a href="deals.html">Khuyến mãi</a></li>
            <li><a href="smart-home.html">Nhà thông minh</a></li>
            <li><a href="blog.html">Bài viết</a></li>
            <li><a href="weekly.html" class="active">Ưu đãi trong tuần</a></li>
          </ul>

          <div class="hotline">
            <i class="fas fa-phone-alt"></i> Hotline: +888-256-666
          </div>
        </div>
      </nav>

      <!-- MAIN -->
      <main>
        <section class="section-title">
          <div class="container">
            <h1>Ưu đãi trong tuần</h1>
            <p>Chọn ngay sản phẩm giảm giá tốt nhất chỉ có trong tuần này.</p>
          </div>
        </section>

        <section class="weekly-grid">
          <div class="container">
            <div id="weeklyGrid">
              <div class="loading-message">Đang tải ưu đãi tuần...</div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const weeklyGrid = document.getElementById("weeklyGrid");

        function formatPrice(value) {
          return Number(value).toLocaleString("vi-VN", {
            style: "currency",
            currency: "VND",
            maximumFractionDigits: 0,
          });
        }

        function renderWeekly(products) {
          if (!weeklyGrid) return;
          if (!products || products.length === 0) {
            weeklyGrid.innerHTML =
              '<div class="empty-state">Không có ưu đãi tuần nào.</div>';
            return;
          }

          weeklyGrid.innerHTML = products
            .slice(0, 6) // Giới hạn 6 sản phẩm
            .map((product, index) => {
              const image =
                product.image_url ||
                "https://via.placeholder.com/150?text=Ưu+đãi+tuần";
              const price = formatPrice(product.price || 0);
              const discountPercent = [30, 25, 20, 35, 15, 40][index % 6];
              const discountedPrice = Math.round(
                (product.price || 0) * (1 - discountPercent / 100),
              );
              const discountedPriceFormatted = formatPrice(discountedPrice);
              const isHighlight = index === 2;
              return `
                <article class="weekly-card ${isHighlight ? "highlight-card" : ""}">
                  <img src="${image}" alt="${product.name || "Sản phẩm"}" />
                  <h3>Giảm ${discountPercent}% - ${product.name || "Sản phẩm"}</h3>
                  <p>${product.description || ""}</p>
                  <div class="price">
                    <span class="old-price">${price}</span>
                    <i> -> </i>
                    <span class="current-price">${discountedPriceFormatted}</span>
                  </div>
                  <a href="shop.html" class="select-options-btn">Mua ngay</a>
                </article>`;
            })
            .join("");
        }

        async function loadWeekly() {
          if (!weeklyGrid) return;
          weeklyGrid.innerHTML =
            '<div class="loading-message">Đang tải ưu đãi tuần...</div>';
          try {
            const response = await fetch("http://localhost:3000/api/products");
            if (!response.ok) throw new Error("Không thể tải ưu đãi tuần");
            const products = await response.json();
            // Lấy sản phẩm ngẫu nhiên cho ưu đãi tuần
            const shuffled = products.sort(() => 0.5 - Math.random());
            renderWeekly(shuffled.slice(0, 6));
          } catch (err) {
            weeklyGrid.innerHTML = `<div class="empty-state">Lỗi tải ưu đãi: ${err.message}</div>`;
            console.error(err);
          }
        }

        loadWeekly();
      });
    </script>
    <script src="ai-chat.js"></script>
  </body>
</html>
